<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Página Temporariamente Arquivada</title>
    <style>
        /* ===== Reset & Base ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f4f6fa;
            padding: 24px;
            margin: 0;
        }

        /* ===== Card principal ===== */
        .archive-card {
            max-width: 720px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            padding: 56px 48px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08), 0 8px 24px rgba(0, 0, 0, 0.04);
            text-align: center;
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .archive-card:hover {
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.10);
        }

        /* ===== Ícone / Ilustração ===== */
        .icon-wrapper {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 96px;
            height: 96px;
            background: #f0f2f7;
            border-radius: 50%;
            margin-bottom: 28px;
            transition: background 0.3s ease;
        }

        .archive-card:hover .icon-wrapper {
            background: #e8ebf2;
        }

        .icon-wrapper svg {
            width: 48px;
            height: 48px;
            fill: none;
            stroke: #2c3e50;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ===== Títulos ===== */
        .badge {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #7f8c8d;
            background: #f0f2f7;
            padding: 6px 18px;
            border-radius: 100px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            color: #1e2b3a;
            margin-bottom: 14px;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        h1 span {
            color: #e67e22;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #5d6d7e;
            line-height: 1.6;
            max-width: 440px;
            margin: 0 auto 32px auto;
            font-weight: 400;
        }

        /* ===== Linha decorativa ===== */
        .divider {
            width: 64px;
            height: 3px;
            background: linear-gradient(90deg, #e67e22, #f39c12);
            border-radius: 4px;
            margin: 0 auto 32px auto;
        }

        /* ===== Detalhes / Metadados ===== */
        .meta-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px 28px;
            margin-bottom: 36px;
            font-size: 0.9rem;
            color: #5d6d7e;
        }

        .meta-list li {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .meta-list li::before {
            content: "•";
            color: #e67e22;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .meta-list li:first-child::before {
            content: "";
            display: none;
        }

        /* ===== Botão ===== */
        .btn {
            display: inline-block;
            background: #1e2b3a;
            color: #ffffff;
            font-weight: 600;
            font-size: 1rem;
            padding: 14px 40px;
            border-radius: 60px;
            text-decoration: none;
            transition: background 0.25s ease, transform 0.15s ease, box-shadow 0.25s ease;
            border: none;
            cursor: pointer;
            letter-spacing: 0.01em;
            box-shadow: 0 4px 12px rgba(30, 43, 58, 0.15);
        }

        .btn:hover {
            background: #2c3e50;
            box-shadow: 0 8px 24px rgba(30, 43, 58, 0.20);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 12px rgba(30, 43, 58, 0.15);
        }

        /* ===== Rodapé ===== */
        .footer-note {
            margin-top: 36px;
            font-size: 0.8rem;
            color: #aab2bd;
            letter-spacing: 0.02em;
            border-top: 1px solid #f0f2f7;
            padding-top: 24px;
        }

        /* ============================================= */
        /* ===== RESPONSIVO — MOBILE FIRST ===== */
        /* ============================================= */

        @media (max-width: 600px) {
            .archive-card {
                padding: 36px 24px;
                border-radius: 24px;
            }

            .icon-wrapper {
                width: 76px;
                height: 76px;
                margin-bottom: 20px;
            }

            .icon-wrapper svg {
                width: 38px;
                height: 38px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .subtitle {
                font-size: 1rem;
                padding: 0 4px;
            }

            .meta-list {
                gap: 8px 16px;
                font-size: 0.82rem;
                flex-direction: column;
                align-items: center;
            }

            .meta-list li::before {
                display: none;
            }

            .meta-list li:not(:last-child)::after {
                content: "·";
                color: #d0d6df;
                margin-left: 4px;
            }

            .btn {
                width: 100%;
                padding: 14px 20px;
                font-size: 1rem;
            }

            .footer-note {
                font-size: 0.7rem;
                padding-top: 20px;
                margin-top: 28px;
            }
        }

        @media (max-width: 400px) {
            .archive-card {
                padding: 28px 16px;
                border-radius: 20px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .badge {
                font-size: 0.65rem;
                padding: 4px 14px;
            }
        }

        /* ===== Ajuste para telas muito grandes ===== */
        @media (min-width: 1200px) {
            .archive-card {
                padding: 72px 64px;
            }

            h1 {
                font-size: 3rem;
            }

            .subtitle {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <main class="archive-card" role="main">

        <!-- Ícone (caixa de arquivo) -->
        <div class="icon-wrapper" aria-hidden="true">
            <svg viewBox="0 0 24 24">
                <path d="M4 4h16v16H4z" />
                <path d="M8 8h8" />
                <path d="M8 12h6" />
                <path d="M8 16h4" />
                <rect x="2" y="3" width="20" height="18" rx="2" ry="2" />
            </svg>
        </div>

        <!-- Badge -->
        <div class="badge">Arquivado</div>

        <!-- Título principal -->
        <h1>
            Página <span>Arquivada</span>
        </h1>

        <!-- Subtítulo -->
        <p class="subtitle">
            Esta página foi temporariamente arquivada e não está disponível no momento.
            Em breve estará de volta com novidades.
        </p>

        <!-- Divisória -->
        <div class="divider" aria-hidden="true"></div>

        <!-- Metadados -->
        <ul class="meta-list">
            <li>Arquivado em 24/06/2026</li>
            <li>Previsão de retorno: breve</li>
            <li>Equipe de desenvolvimento</li>
        </ul>

        <!-- Botão de ação -->
        <a href="#" class="btn" role="button">
            🔄  Atualizar página
        </a>

        <!-- Rodapé -->
        <div class="footer-note">
            &copy; 2026 · Todos os direitos reservados
        </div>

    </main>

    <!-- ===== Script simples para o botão ===== -->
    <script>
        (function() {
            const btn = document.querySelector('.btn');
            if (btn) {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    location.reload();
                });
            }
        })();
    </script>

</body>
</html>
